<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEX Foundation // Core Network Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap');
    html, body {
      font-family: 'JetBrains Mono', monospace;
      background-color: #030303;
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    .crt-scanlines {
      background: linear-gradient(rgba(18,16,16,0) 50%,rgba(0,0,0,0.3) 50%),linear-gradient(90deg,rgba(255,0,0,0.04),rgba(0,255,0,0.02),rgba(0,255,0,0.04));
      background-size: 100% 4px,6px 100%;
      pointer-events: none;
    }
    .blink { animation: blinker 1s step-start infinite; }
    @keyframes blinker { 50% { opacity: 0; } }
    .glitch-text { text-shadow: 0 0 8px rgba(220,38,38,0.4); }
    button, input, form { pointer-events: auto; -webkit-user-select: none; user-select: none; }
    button, input[type="submit"], input[type="button"] { min-height: 44px; min-width: 44px; }
    
    /* Mobile button improvements */
    @media (max-width: 768px) {
      button { min-height: 48px !important; padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
      input[type="text"], input[type="password"], textarea, select { min-height: 48px; padding: 0.75rem !important; }
      .md\:hidden button { min-height: 52px; font-size: 14px; }
    }
    /* ─── MOBILE OPTIMIZATIONS ─── */
    @media (max-width: 640px) {
      .text-\[10px\] { font-size: 11px !important; }
      .text-xs { font-size: 12px !important; }
      .text-sm { font-size: 13px !important; }
      .text-base { font-size: 14px !important; }
      h1 { font-size: 18px !important; }
      input::placeholder { font-size: 12px; }
    }
    @media (max-width: 768px) {
      * { -webkit-tap-highlight-color: rgba(220,38,38,0.2); }
      button:active { opacity: 0.8; }
    }
    @media (max-width: 640px) { input, textarea, select { font-size: 16px; } }
    header { overflow-x: auto; -webkit-overflow-scrolling: touch; overflow-y: hidden; }
    .file-body-container { max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    @media (min-width: 641px) { .file-body-container { max-height: 60vh; } }
    @media (max-width: 640px) { .file-body-container { max-height: auto; } }
    #mobileFileMenu { scrollbar-width: thin; scrollbar-color: #27272a rgba(0,0,0,0.2); }
    #mobileFileMenu button { margin-bottom: 0.5rem; min-height: 48px; font-size: 13px; line-height: 1.4; }
    @media (max-width: 768px) { 
      #mobileFileMenu { display: block; max-height: 55vh; } 
      #mobileFileMenu .p-2 { padding: 0.75rem !important; }
      #mainViewport { margin-top: 0; } 
    }
    @media (min-width: 769px) { #mobileFileMenu { display: none !important; } }
    @media (max-width: 640px) { 
      #mobileFileMenu { max-height: 50vh; }
      #mobileFileMenu button { margin-bottom: 0.75rem !important; font-size: 12px; }
      #mobileFileMenu .space-y-1 { gap: 0.75rem !important; }
    }
    @media (max-width: 640px) { 
      #terminalModal { padding: 0; border-radius: 0; } 
      #terminalModal .max-w-2xl { width: 100%; max-width: 100%; border-radius: 0; } 
      #terminalFeed { max-height: 55vh; font-size: 12px; padding: 1rem 0.75rem; } 
      #terminalForm { min-height: 56px; padding: 0.75rem !important; gap: 0.5rem !important; }
      #terminalInput { min-height: 48px !important; padding: 0.75rem !important; font-size: 14px !important; }
      #closeTerminalBtn { padding: 0.5rem !important; }
    }
    @media (min-width: 641px) { #terminalFeed { max-height: 50vh; font-size: 12px; } }
    
    /* Mobile-specific layout */
    @media (max-width: 768px) {
      body { overflow: auto; }
      html, body { height: auto; min-height: 100vh; }
      .w-full.h-screen.flex { height: auto; min-height: 100vh; flex-direction: column; }
      main { max-height: none !important; }
      .flex-1 { min-height: auto; }
      header { height: auto; }
      .hidden.md\\:flex { display: flex !important; }
    }
    .scientist-card { cursor: pointer; transition: all 0.2s ease; }
    .scientist-card:hover { transform: translateY(-2px); }
    #scientistModal { z-index: 60; }
    
    /* Mobile Modal Optimizations */
    @media (max-width: 768px) {
      #scientistModal { padding: 0 !important; }
      #scientistModal .w-full.max-w-6xl { max-width: 100% !important; border-radius: 0; max-height: 100vh; }
      #scientistModal .flex-1.flex.overflow-hidden { flex-direction: column; }
      #scientistModal .w-80 { width: 100% !important; border-right: none; border-bottom: 1px solid #78350f; max-height: auto; padding: 3rem 1rem 1rem !important; }
      #scientistModal .flex-1.overflow-y-auto { padding: 1rem !important; }
      #scientistModal .grid { grid-template-columns: 1fr 1fr !important; gap: 1rem !important; }
    }
    @media (max-width: 640px) {
      #scientistModal .grid { grid-template-columns: 1fr !important; }
      #scientistModal .w-80 { padding: 2rem 1rem 1rem !important; }
      #scientistModal .flex-1.overflow-y-auto { padding: 0.75rem !important; }
    }

    /* ─── DEV CONSOLE ─── */
    #devConsole {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 70;
      display: none;
      flex-direction: column;
    }
    #devConsole.open { display: flex; }
    .dev-header {
      background: #0a0a0a;
      border-bottom: 1px solid #166534;
      padding: .6rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .dev-header h2 { color: #4ade80; font-size: .7rem; letter-spacing: .2em; text-transform: uppercase; }
    .dev-header span { color: #16a34a; font-size: .65rem; }
    #closeDevConsole { background: transparent; border: 1px solid #166534; color: #4ade80; font-family: inherit; font-size: .65rem; padding: .3rem .7rem; min-height: 32px; cursor: pointer; border-radius: 3px; }
    #closeDevConsole:hover { background: #14532d; }
    .dev-body { flex: 1; display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }
    .dev-players { border-right: 1px solid #14532d; background: #050505; overflow-y: auto; padding: .75rem; }
    .dev-players h3 { color: #4ade80; font-size: .6rem; letter-spacing: .15em; text-transform: uppercase; margin-bottom: .75rem; border-bottom: 1px solid #14532d; padding-bottom: .4rem; }
    .player-btn {
      width: 100%; text-align: left; background: #0a1a0f; border: 1px solid #14532d;
      color: #86efac; font-family: inherit; font-size: .65rem; padding: .6rem .75rem;
      border-radius: 3px; margin-bottom: .4rem; cursor: pointer; transition: all .2s;
      min-height: 44px; display: flex; align-items: center; gap: .5rem;
    }
    .player-btn:hover { background: #14532d; border-color: #16a34a; color: #4ade80; }
    .player-btn.selected { background: #14532d; border-color: #22c55e; color: #4ade80; }
    .player-btn .pip { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; flex-shrink: 0; animation: pipPulse 2s ease-in-out infinite; }
    @keyframes pipPulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
    .player-btn .pip.idle { background: #ca8a04; animation: none; }
    .dev-view { background: #030303; overflow-y: auto; padding: 1rem; }
    .dev-view h3 { color: #4ade80; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 1rem; }
    .dev-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; margin-bottom: 1rem; }
    .dev-stat { background: #0a1a0f; border: 1px solid #14532d; border-radius: 3px; padding: .6rem .75rem; }
    .dev-stat .label { color: #4ade80; font-size: .55rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: .3rem; }
    .dev-stat .value { color: #86efac; font-size: .75rem; font-weight: bold; }
    .dev-activity { background: #050505; border: 1px solid #14532d; border-radius: 3px; padding: .75rem; }
    .dev-activity h4 { color: #4ade80; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; margin-bottom: .6rem; border-bottom: 1px solid #14532d; padding-bottom: .3rem; }
    .activity-line { font-size: .65rem; color: #4b5563; padding: .25rem 0; border-bottom: 1px solid #0a1a0f; display: flex; gap: .75rem; }
    .activity-line .ts { color: #14532d; flex-shrink: 0; }
  </style>
</head>
<body class="crt-scanlines">
  <!-- Page content here -->
  <script>
    /* ══════════════════════════════════════════
       SESSION ID GENERATION — FIXED VERSION
    ══════════════════════════════════════════ */
    
    // Initialize SESSION_ID BEFORE anything else
    let SESSION_ID = null;
    
    function initializeSessionID() {
      // First, try to get from sessionStorage
      SESSION_ID = sessionStorage.getItem('sessionId');
      
      // If not found, generate a new one
      if (!SESSION_ID) {
        SESSION_ID = 'user_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now();
        sessionStorage.setItem('sessionId', SESSION_ID);
      }
      
      // Validation: ensure SESSION_ID is a valid string
      if (typeof SESSION_ID !== 'string' || SESSION_ID.length === 0) {
        console.error('❌ SESSION_ID initialization failed, regenerating...');
        SESSION_ID = 'user_' + Math.random().toString(36).substring(2, 11) + '_' + Date.now();
        sessionStorage.setItem('sessionId', SESSION_ID);
      }
      
      console.log('✓ Session ID initialized:', SESSION_ID);
      return SESSION_ID;
    }
    
    // Call this immediately - DO NOT delay
    initializeSessionID();

    // Firebase setup
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Session data object
    const sessionData = {
      id: SESSION_ID,  // Store the SESSION_ID in the data object too
      clearanceLevel: 0,
      currentView: 'overview',
      activityLog: [],
      consentedAt: null,
      lastSeen: Date.now(),
      createdAt: Date.now()
    };

    function ts() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    function logActivity(action) {
      if (!sessionData.activityLog) sessionData.activityLog = [];
      sessionData.activityLog.push({
        ts: ts(),
        action: action
      });
      // Keep only last 50 activities to save space
      if (sessionData.activityLog.length > 50) {
        sessionData.activityLog = sessionData.activityLog.slice(-50);
      }
    }

    function saveSession() {
      // CRITICAL: Validate SESSION_ID before every save
      if (!SESSION_ID || typeof SESSION_ID !== 'string' || SESSION_ID.length === 0) {
        console.error('❌ Cannot save session: SESSION_ID is invalid', SESSION_ID);
        return;
      }

      sessionData.lastSeen = Date.now();
      sessionData.id = SESSION_ID;  // Always keep ID in sync
      
      db.ref('apex_sessions/' + SESSION_ID).set(sessionData).catch(e => {
        console.error('Session save error:', e);
      });
    }

    // Update heartbeat with validation
    const heartbeatInterval = setInterval(() => {
      if (!SESSION_ID || SESSION_ID === 'undefined') {
        console.error('❌ Heartbeat aborted: SESSION_ID is invalid');
        return;
      }
      saveSession();
    }, 20000);

    // Clean up on page unload - gracefully remove the session
    window.addEventListener('beforeunload', () => {
      if (SESSION_ID && SESSION_ID !== 'undefined') {
        // Optional: mark session as closed instead of deleting
        db.ref('apex_sessions/' + SESSION_ID + '/status').set('closed');
      }
    });

    // Dev Console Code (truncated in this example)
    const devConsole = document.getElementById('devConsole');
    const playerList = document.getElementById('playerList');
    const devView = document.getElementById('devView');
    let selectedPlayer = null;
    let activePlayerRef = null;

    function watchPlayer(id) {
      if (activePlayerRef) activePlayerRef.off("value");
      activePlayerRef = db.ref("apex_sessions/" + id);
      activePlayerRef.on("value", snap => {
        const s = snap.val();
        if (s) renderPlayerView(s);
      });
    }

    function openDevConsole() {
      devConsole.classList.add('open');
      refreshDevConsole();
    }

    function refreshDevConsole() {
      if (!playerList) return;
      playerList.innerHTML = '<p style="color:#14532d;font-size:.65rem;text-align:center;padding:.75rem;">Connecting to Firebase...</p>';

      db.ref('apex_sessions').on('value', snap => {
        const val = snap.val();
        const sessions = val ? Object.values(val).filter(s => s && typeof s === 'object') : [];
        const now = Date.now();
        const active = sessions.filter(s => (now - s.lastSeen) < 5 * 60 * 1000);
        const idle = sessions.filter(s => (now - s.lastSeen) >= 5 * 60 * 1000 && (now - s.lastSeen) < 30 * 60 * 1000);
        
        console.log(`📊 Sessions - Active: ${active.length}, Idle: ${idle.length}, Total: ${sessions.length}`);
        renderDevConsole([...active, ...idle]);
      });
    }

    function renderDevConsole(sessions) {
      if (!playerList) return;
      playerList.innerHTML = '';
      if (!sessions || sessions.length === 0) {
        playerList.innerHTML = '<p class="no-players-msg">No sessions found.</p>';
        return;
      }

      const now = Date.now();
      sessions.forEach(s => {
        const isActive = (now - s.lastSeen) < 5 * 60 * 1000;
        const isSelf = s.id === SESSION_ID;
        const btn = document.createElement('button');
        btn.className = 'player-btn' + (selectedPlayer === s.id ? ' selected' : '');
        const elapsed = Math.floor((now - s.lastSeen) / 1000);
        const elapsedStr = elapsed < 60 ? `${elapsed}s ago` : `${Math.floor(elapsed/60)}m ago`;
        btn.innerHTML = `<span class="pip ${isActive ? '' : 'idle'}"></span>
          <span style="flex:1;overflow:hidden;">
            <span style="display:block;font-size:.65rem;color:${isActive ? '#86efac' : '#ca8a04'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              ${isSelf ? '★ YOU — ' : ''}${s.id}
            </span>
          </span>`;
        btn.addEventListener('click', () => {
          selectedPlayer = s.id;
          document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          watchPlayer(s.id);
        });
        playerList.appendChild(btn);
      });
    }

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', () => {
      console.log('✓ Page loaded, SESSION_ID ready:', SESSION_ID);
      sessionData.consentedAt = ts();
      logActivity('Session initialized');
      saveSession();
    });
  </script>
</body>
</html>
